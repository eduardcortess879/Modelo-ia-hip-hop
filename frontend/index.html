<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Agente Hip Hop</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-light">

  <div class="container-fluid vh-100 d-flex flex-column p-0">

    <!-- HEADER -->
    <div class="d-flex align-items-center justify-content-between p-2 p-md-3 border-bottom border-secondary">

      <!-- Responsive text -->
      <h5 class="mb-0 fs-6 fs-md-4">Agente Hip Hop</h5>

      <span class="badge bg-success">Online</span>
    </div>

    <!-- CHAT -->
    <div id="chat" class="flex-grow-1 overflow-auto p-2 p-md-3"></div>

    <!-- INPUT -->
    <div class="p-2 p-md-3 border-top border-secondary">

      <div class="input-group">

        <input id="input" type="text"
          class="form-control bg-dark text-light border-secondary"
          placeholder="Escribe sobre hip hop...">

        <button onclick="enviar()" class="btn btn-primary">
          <i class="bi bi-send-fill"></i>
        </button>

      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
