<!DOCTYPE html>
<html lang="es">

<head>
     <!-- CONFIGURACIÓN GENERAL -->
     <meta charset="UTF-8">
     <title>Agente Hip Hop</title>

     <!-- BOOTSTRAP (UI FRAMEWORK) Proporciona estilos, layout responsive y componentes -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

     <!-- ICONOS (Bootstrap Icons) -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

     <!-- ESTILOS PERSONALIZADOS -->
     <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-light">

     <!-- CONTENEDOR PRINCIPAL
       - container-fluid: ancho completo
       - vh-100: altura completa de la pantalla
       - flex-column: layout vertical -->
     <div class="container-fluid vh-100 d-flex flex-column">

          <!-- HEADER (ENCABEZADO) Contiene el título del agente y estado -->
          <div class="d-flex align-items-center justify-content-between p-3 border-bottom border-secondary">

               <!-- Título -->
               <h4 class="mb-0">Agente Hip Hop</h4>

               <!-- Estado del sistema -->
               <span class="badge bg-success">Online</span>
          </div>

          <!-- CONTENEDOR DEL CHAT
         Aquí se insertan dinámicamente los mensajes
         desde script.js
         Clases:
         - flex-grow-1 → ocupa todo el espacio disponible
         - overflow-auto → permite scroll
         - p-3 → padding interno   -->
          <div id="chat" class="flex-grow-1 overflow-auto p-3"></div>

          <!-- INPUT DEL USUARIO Permite escribir mensajes y enviarlos al backend
    -->
          <div class="p-3 border-top border-secondary">

               <!-- Grupo input + botón -->
               <div class="input-group">

                    <!-- Campo de texto -->
                    <input id="input" type="text" class="form-control bg-dark text-light border-secondary"
                         placeholder="Escribe sobre hip hop...">

                    <!-- Botón de envío -->
                    <button onclick="enviar()" class="btn btn-primary">
                         <i class="bi bi-send-fill"></i>
                    </button>

               </div>
          </div>

     </div>

     <!-- SCRIPT PRINCIPAL Contiene la lógica del chat (script.js)
  -->
     <script src="script.js"></script>

</body>

</html>
